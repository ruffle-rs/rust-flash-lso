version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      yew:
        # Likely to need its own fixes, separate to anything else
        patterns:
          - "yew"

      web:
        patterns:
          - web-sys
          - js-sys
          - wasm-bindgen

      cargo-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"